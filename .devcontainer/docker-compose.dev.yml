services:
  app:
    # Keeps the container running without executing the app automatically.
    # This allows us to work inside it contextually (tests, scripts, git).
    command: /bin/sh -c "while sleep 1000; do :; done"
    restart: "no"
    # Additional environment variables for dev can go here

  pgadmin:
    image: dpage/pgadmin4
    container_name: bet_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
